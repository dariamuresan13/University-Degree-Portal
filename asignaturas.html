<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="asignaturas.css">

</head>
<body>

    <div class="shape square" style="top: 10%; left: 15%;"></div>
    <div class="shape square" style="top: 60%; left: 70%;"></div>
    <div class="shape circle" style="top: 30%; left: 40%;"></div>
    <div class="shape circle" style="top: 80%; left: 20%;"></div>

    <div class="container mt-5">
        <h2 class="text-center fw-bold" style="color: rgb(5, 47, 7);">Subjects</h2>

        <!-- Create Subject Button -->
        <div class="text-center my-3">
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createSubjectModal">Create Subject</button>
        </div>

        <!-- Subject List -->
        <ul id="subject-list" class="list-group"></ul>

        <!-- Buttons -->
        <div class="text-center mt-3">
            <button id="back" class="btn btn-secondary">Back</button>
            <button id="logout" class="btn btn-danger">Logout</button>
        </div>
    </div>

    <!-- Create Subject Modal -->
    <div class="modal fade" id="createSubjectModal" tabindex="-1" aria-labelledby="createSubjectModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="create-subject-form">
                    <div class="modal-header">
                        <h5 class="modal-title" id="createSubjectModalLabel">Create New Subject</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div id="subject-form-error" class="text-danger mb-2"></div>
                        <div id="subject-form-success" class="text-success mb-2"></div>

                        <div class="mb-3">
                            <label for="id_asignatura" class="form-label">ID Subject</label>
                            <input type="text" class="form-control" id="id_asignatura" required>
                        </div>

                        <div class="mb-3">
                            <label for="subject" class="form-label">Subject Name</label>
                            <input type="text" class="form-control" id="subject" required>
                        </div>

                        <div class="mb-3">
                            <label for="course" class="form-label">Course</label>
                            <input type="text" class="form-control" id="course" required>
                        </div>

                        <div class="mb-3">
                            <label for="typology" class="form-label">Typology</label>
                            <input type="text" class="form-control" id="typology" required>
                        </div>

                        <div class="mb-3">
                            <label for="ects" class="form-label">ECTS</label>
                            <input type="text" class="form-control" id="ects" required>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-save-custom">Save</button>

                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
