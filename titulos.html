<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Degrees</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="titlestyle.css">
</head>
<body>

<div class="container mt-5 d-flex flex-column align-items-center">
    <div class="card p-4 shadow-lg" style="width: 50rem;">
        <h2 class="text-center fw-bold" style="color: rgb(5, 47, 7);">Available Degrees</h2>

        <!-- Create Title Button -->
        <div class="text-center my-3">
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createTitleModal">Create Title</button>
        </div>

        <!-- List of Titles -->
        <ul id="title-list" class="list-group mt-3"></ul>

        <!-- Logout Button -->
        <div class="text-center mt-3">
            <button id="logout" class="btn btn-danger">Logout</button>
        </div>
    </div>
</div>

<!-- Create Title Modal -->
<div class="modal fade" id="createTitleModal" tabindex="-1" aria-labelledby="createTitleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="create-title-form">
                <div class="modal-header">
                    <h5 class="modal-title" id="createTitleModalLabel">Create New Title</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div id="form-error" class="text-danger mb-2"></div>
                    <div id="form-success" class="text-success mb-2"></div>

                    <div class="mb-3">
                        <label for="id_titulo" class="form-label">ID Title</label>
                        <input type="text" class="form-control" id="id_titulo" required>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Degree Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="level" class="form-label">Level</label>
                        <input type="text" class="form-control" id="level" required>
                    </div>

                    <div class="mb-3">
                        <label for="acronym" class="form-label">Acronym</label>
                        <input type="text" class="form-control" id="acronym" required>
                    </div>

                    <div class="mb-3">
                        <label for="center" class="form-label">Center</label>
                        <input type="text" class="form-control" id="center" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-custom-save">Save</button>

                </div>

            </form>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your App JS -->
<script src="app.js"></script>

</body>
</html>
